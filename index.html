<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>dataterminals</title>
  <meta name="description" content="Mods, tools & datamining for the games we play.">
  <meta name="color-scheme" content="dark">

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="dataterminals">
  <meta property="og:description" content="Mods, tools & datamining for the games we play.">
  <meta property="og:url" content="https://dataterminals.github.io/">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='7' fill='%23d8794c'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Blurred looping background. Drop assets/bg.webm + assets/bg.mp4 (+ poster.jpg) in.
       Until then, the CSS oxblood gradient shows through. -->
  <div class="bg" aria-hidden="true">
    <video class="bg__video" autoplay muted loop playsinline preload="auto" poster="assets/poster.jpg">
      <source src="assets/bg.webm" type="video/webm">
      <source src="assets/bg.mp4" type="video/mp4">
    </video>
  </div>
  <div class="bg__scrim" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <main>
    <div class="screen">
      <header class="hero">
        <h1 class="hero__name reveal" aria-label="dataterminals"><span class="spindle" aria-hidden="true"><span class="spindle__track"><span class="spindle__word">data</span><span class="spindle__word">sylvi</span><span class="spindle__word">deni</span><span class="spindle__word">data</span></span></span><span class="spindle__suffix" aria-hidden="true">terminals</span></h1>
        <p class="hero__tagline" aria-label="In my time…"><span class="tl tl-en" style="left:1%; top:48px; font-size:1.2rem; letter-spacing:.06em; --o:.95; --d:.2s">In my time…</span><span class="tl" aria-hidden="true" style="left:7%; top:6px; font-size:1.05rem; --o:.5; --d:.55s">私の時代に…</span><span class="tl" aria-hidden="true" style="left:68%; top:42px; font-size:1rem; letter-spacing:.03em; --o:.42; --d:.75s">В мое время …</span><span class="tl" aria-hidden="true" style="left:11%; top:86px; font-size:1rem; --o:.5; --d:.95s">在我的时代…</span><span class="tl" aria-hidden="true" style="left:74%; top:4px; font-size:.98rem; letter-spacing:.02em; --o:.4; --d:1.15s">내 시간에…</span><span class="tl" aria-hidden="true" dir="rtl" style="left:73%; top:88px; font-size:.95rem; --o:.4; --d:1.35s">في وقتي…</span><span class="tl" aria-hidden="true" style="left:42%; top:20px; font-size:1rem; letter-spacing:.03em; --o:.47; --d:1.55s">De mon temps…</span><span class="tl" aria-hidden="true" style="left:35%; top:54px; font-size:.98rem; --o:.44; --d:1.75s">मेरे समय में…</span><span class="tl" aria-hidden="true" style="left:39%; top:80px; font-size:.95rem; --o:.42; --d:1.95s">Στον καιρό μου…</span></p>
      </header>

      <section class="links" aria-label="Selected projects">
        <p class="links__eyebrow">Selected work</p>
        <div class="links__list" id="links">
          <!-- rendered from links.json (featured), enriched from the GitHub API -->
        </div>
      </section>

      <a class="scroll-cue" href="#chart" aria-label="Natal chart below">
        <span>natal chart</span>
        <span class="scroll-cue__arrow" aria-hidden="true">↓</span>
      </a>
    </div>

    <section class="chart" id="chart" aria-label="Natal chart">
      <p class="chart__eyebrow">Natal chart<span class="chart__sub"> · Leo rising, 12th-house stellium</span></p>
      <div class="chart__wrap" id="natal">
        <!-- wheel + placements rendered by natal.js -->
      </div>
    </section>

    <section class="tarot" id="tarot" aria-label="Tarot">
      <p class="chart__eyebrow">Tarot<span class="chart__sub"> · the chart, in the cards</span></p>
      <div class="tarot__deck" id="tarot-deck">
        <!-- cards rendered by tarot.js -->
      </div>
    </section>

    <footer class="foot reveal">
      <a href="https://github.com/dataterminals" target="_blank" rel="noopener">GitHub&nbsp;↗</a>
      <span class="foot__sep" aria-hidden="true">·</span>
      <span>Everything I build lives there.</span>
    </footer>
  </main>

  <script src="app.js"></script>
  <script src="natal.js"></script>
  <script src="tarot.js"></script>
</body>
</html>
